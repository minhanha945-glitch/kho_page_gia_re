<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Kho Page Facebook Chất Lượng</title>

<!-- SEO -->

<meta
name="description"
content="Kho page Facebook chất lượng cao, follow thật, hỗ trợ sang tên đổi chủ nhanh, bảo mật fanpage miễn phí."/>

<meta
name="keywords"
content="mua bán page facebook, fanpage facebook, page follow thật, page facebook chất lượng"/>

<meta property="og:title" content="Kho Page Facebook"/>
<meta property="og:description" content="Kho page Facebook follow thật, sang tên nhanh."/>
<meta property="og:type" content="website"/>

<!-- ICON -->

<link
rel="icon"
type="image/svg+xml"
href='data:image/svg+xml,
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
<defs>
<linearGradient id="g" x1="0" x2="1">
<stop stop-color="%238b5cf6"/>
<stop offset="1" stop-color="%23ec4899"/>
</linearGradient>
</defs>

<rect width="64" height="64" rx="18" fill="url(%23g)"/>

<circle cx="22" cy="22" r="10" fill="white"/>

<path d="M18 22h8M22 18v8"
stroke="%238b5cf6"
stroke-width="3"
stroke-linecap="round"/>

<path
d="M38 18h10v28H18V36"
stroke="white"
stroke-width="4"
stroke-linecap="round"
stroke-linejoin="round"
fill="none"/>

<circle cx="24" cy="50" r="4" fill="white"/>
<circle cx="44" cy="50" r="4" fill="white"/>

</svg>'/>

<script src="https://cdn.tailwindcss.com"></script>

<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>

<style>

@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Montserrat',sans-serif;
    background:#f3f0ff;
    color:#1e293b;
}

/* HERO */

.hero{
    background:
    linear-gradient(
        135deg,
        #8b5cf6,
        #ec4899
    );
}

/* CARD */

.page-card{
    background:white;
    border-radius:32px;
    overflow:hidden;
    position:relative;
    transition:.35s;
    box-shadow:0 15px 40px rgba(0,0,0,.08);

    display:flex;
    flex-direction:column;

    height:100%;
}

.page-card:hover{
    transform:translateY(-10px);
}

/* IMAGE */

.image-box{
    position:relative;
    height:320px;
    overflow:hidden;
}

.image-box img{
    width:100%;
    height:100%;
    object-fit:cover;
    transition:.5s;
}

.page-card:hover .image-box img{
    transform:scale(1.06);
}

/* OVERLAY */

.image-overlay{
    position:absolute;
    inset:0;

    background:
    linear-gradient(
        to top,
        rgba(0,0,0,.7),
        rgba(0,0,0,.1)
    );

    opacity:0;

    transition:.35s;

    display:flex;
    align-items:flex-end;

    padding:24px;
}

.page-card:hover .image-overlay{
    opacity:1;
}

/* BADGE */

.badge{
    background:rgba(255,255,255,.92);

    color:#7c3aed;

    padding:12px 24px;

    border-radius:999px;

    font-size:13px;

    font-weight:800;

    letter-spacing:.2em;
}

/* INFO */

.info{
    padding:36px;

    display:flex;
    flex-direction:column;

    flex:1;
}

/* TITLE */

.page-title{
    font-size:54px;
    font-weight:900;
    line-height:1.05;

    color:#1e293b;

    margin-bottom:28px;

    overflow-wrap:anywhere;
}

/* ROW */

.row{
    display:flex;
    justify-content:space-between;

    gap:18px;

    padding:18px 0;

    border-bottom:1px solid #ececec;
}

.row-label{
    color:#64748b;
    font-weight:600;

    min-width:110px;
}

.row-value{
    font-weight:700;
    text-align:right;

    overflow-wrap:anywhere;
}

/* ACTION AREA */

.action-buttons{

    margin-top:auto;

    padding-top:32px;

    display:flex;
    flex-direction:column;

    gap:14px;
}

/* BUTTON */

.btn{
    width:100%;

    display:flex;
    align-items:center;
    justify-content:center;

    gap:10px;

    background:
    linear-gradient(
        135deg,
        #8b5cf6,
        #ec4899
    );

    color:white;

    text-decoration:none;

    padding:16px 24px;

    border-radius:999px;

    font-weight:800;

    transition:.3s;
}

.btn:hover{
    transform:translateY(-2px) scale(1.02);
}

/* BUY BUTTON */

.btn-buy{

    background:
    linear-gradient(
        135deg,
        #22c55e,
        #16a34a
    );
}

.btn-buy:hover{
    box-shadow:
    0 10px 25px
    rgba(34,197,94,.35);
}

/* SEARCH */

.search{
    width:100%;

    padding:18px 24px;

    border:none;

    border-radius:20px;

    outline:none;

    font-size:16px;
}

/* FILTER BUTTON */

.filter-btn{
    background:white;

    border:none;

    border-radius:18px;

    padding:14px 24px;

    font-weight:700;

    cursor:pointer;

    transition:.25s;
}

.filter-btn:hover{
    transform:translateY(-2px);
}

/* LOADING */

.loading{
    text-align:center;

    font-size:24px;

    color:#7c3aed;

    padding:100px 0;
}

/* MOBILE */

@media(max-width:768px){

    .page-title{
        font-size:38px;
    }

    .hero-title{
        font-size:54px !important;
    }

    .row{
        flex-direction:column;
    }

    .image-box{
        height:260px;
    }

}

</style>
</head>

<body>

<!-- HERO -->

<section class="hero py-24 px-6 text-center text-white">

    <div class="max-w-5xl mx-auto">

        <div class="inline-block bg-white/20 px-8 py-4 rounded-full font-extrabold tracking-[0.25em] text-sm mb-10">
            FACEBOOK MARKETPLACE
        </div>

        <h1 class="hero-title text-7xl font-black leading-none mb-10">
            Kho Page Facebook<br>
            chất lượng cao
        </h1>

        <div class="flex justify-center">

            <a
                href="https://zalo.me/0396430606"
                target="_blank"
                class="btn max-w-[340px]">

                <i class="fas fa-comments"></i>

                Zalo: 0396 430 606

            </a>

        </div>

    </div>

</section>

<!-- CONTENT -->

<section class="max-w-7xl mx-auto px-6 py-16">

    <!-- FILTER -->

    <div class="flex flex-col lg:flex-row gap-5 justify-between mb-14">

        <input
            type="text"
            id="searchInput"
            class="search"
            placeholder="Tìm tên page..."
        >

        <div class="flex flex-wrap gap-4">

            <button
                onclick="sortHigh()"
                class="filter-btn">
                Follow cao ↓
            </button>

            <button
                onclick="sortLow()"
                class="filter-btn">
                Follow thấp ↑
            </button>

            <button
                onclick="resetData()"
                class="filter-btn">
                Reset
            </button>

        </div>

    </div>

    <!-- DATA -->

    <div
        id="sheet-data"
        class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-10">

        <div class="loading">
            Đang tải dữ liệu...
        </div>

    </div>

</section>

<script>

/* ========================= */

const SHEET_ID =
"1vuaQFsI-aoxDstaTuHCwNBkci63WoQVXKObrgZiTqMg";

const SHEET_NAME =
"Trang tính1";

/* ========================= */

let originalData = [];

/* ========================= */

async function loadData(){

    const url =
    `https://opensheet.elk.sh/${SHEET_ID}/${encodeURIComponent(SHEET_NAME)}`;

    try{

        const res =
        await fetch(url);

        const data =
        await res.json();

        originalData = data;

        renderData(data);

    }catch(error){

        document.getElementById("sheet-data").innerHTML = `
        
            <div class="text-red-500 text-2xl">
                Không tải được dữ liệu
            </div>

        `;

        console.log(error);

    }

}

/* ========================= */

function convertFollowers(value){

    if(!value) return 0;

    value = value.toString();

    value = value.replace(/\./g,'');

    value = value.replace(',', '.');

    return parseFloat(value) || 0;

}

/* ========================= */

function renderData(data){

    const container =
    document.getElementById("sheet-data");

    if(!data.length){

        container.innerHTML = `
        
            <div class="text-red-500 text-2xl">
                Không có dữ liệu
            </div>

        `;

        return;

    }

    container.innerHTML = "";

    data.forEach(item=>{

        const insightImage =
        item["INSIGHTS"] ||
        "https://images.unsplash.com/photo-1516321318423-f06f85e504b3?auto=format&fit=crop&w=1200&q=80";

        container.innerHTML += `

        <div class="page-card">

            <!-- IMAGE -->

            <div class="image-box">

                <img
                    src="${insightImage}"
                    alt="preview"
                >

                <div class="image-overlay">

                    <div class="badge">
                        INSIGHTS PREVIEW
                    </div>

                </div>

            </div>

            <!-- INFO -->

            <div class="info">

                <div class="flex items-center justify-between mb-8">

                    <div class="text-purple-600 font-black text-sm tracking-[0.2em]">
                        FACEBOOK PAGE
                    </div>

                    <div class="bg-purple-100 text-purple-700 px-5 py-2 rounded-full text-sm font-bold">
                        ${item["TÌNH TRẠNG"] || "Đang bán"}
                    </div>

                </div>

                <h2 class="page-title">
                    ${item["TÊN PAGE"] || "Không có tên"}
                </h2>

                <!-- ROWS -->

                <div class="space-y-1">

                    <div class="row">

                        <div class="row-label">
                            Followers
                        </div>

                        <div class="row-value text-purple-600 text-3xl">
                            ${item["FOLLOWERS"] || ""}
                        </div>

                    </div>

                    <div class="row">

                        <div class="row-label">
                            Nam/Nữ
                        </div>

                        <div class="row-value">
                            ${item["TỶ LỆ NAM/NỮ"] || ""}
                        </div>

                    </div>

                    <div class="row">

                        <div class="row-label">
                            Năm tạo
                        </div>

                        <div class="row-value">
                            ${item["NĂM TẠO"] || ""}
                        </div>

                    </div>

                    <div class="row">

                        <div class="row-label">
                            TRẠNG THÁI
                        </div>

                        <div class="row-value">
                            ${item["TRẠNG THÁI"] || ""}
                        </div>

                    </div>

                    <div class="row">

                        <div class="row-label">
                            Đổi tên
                        </div>

                        <div class="row-value">
                            ${item["ĐỔI TÊN"] || ""}
                        </div>

                    </div>

                </div>

                <!-- BUTTONS -->

                <div class="action-buttons">

                    <!-- PAGE -->

                    <a
                        href="${item["LINK PAGE"] || "#"}"
                        target="_blank"
                        class="btn">

                        <i class="fab fa-facebook"></i>

                        Xem page

                    </a>

                    <!-- INSIGHTS -->

                    ${
                        item["INSIGHTS"]
                        ?
                        `
                        <a
                            href="${item["INSIGHTS"]}"
                            target="_blank"
                            class="btn">

                            <i class="fas fa-chart-line"></i>

                            Insights

                        </a>
                        `
                        :
                        ""
                    }

                    <!-- BUY -->

                    <a
                        href="https://zalo.me/0396430606"
                        target="_blank"
                        class="btn btn-buy">

                        <i class="fas fa-cart-shopping"></i>

                        Mua ngay

                    </a>

                </div>

            </div>

        </div>

        `;

    });

}

/* ========================= */

function sortHigh(){

    const sorted =
    [...originalData].sort((a,b)=>{

        return convertFollowers(b["FOLLOWERS"])
        - convertFollowers(a["FOLLOWERS"]);

    });

    renderData(sorted);

}

/* ========================= */

function sortLow(){

    const sorted =
    [...originalData].sort((a,b)=>{

        return convertFollowers(a["FOLLOWERS"])
        - convertFollowers(b["FOLLOWERS"]);

    });

    renderData(sorted);

}

/* ========================= */

function resetData(){

    renderData(originalData);

    document.getElementById("searchInput").value = "";

}

/* ========================= */

document
.getElementById("searchInput")
.addEventListener("input",function(e){

    const keyword =
    e.target.value.toLowerCase();

    const filtered =
    originalData.filter(item=>{

        return (
            item["TÊN PAGE"] || ""
        )
        .toLowerCase()
        .includes(keyword);

    });

    renderData(filtered);

});

/* ========================= */

loadData();

</script>

</body>
</html>
